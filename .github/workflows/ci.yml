name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test with coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build

  integration:
    # Live-API round-trip against prompty.tools. Runs on pushes to main only
    # (one run costs ~12 of the key's daily request quota); the suite skips
    # itself when the PROMPTY_TEST_API_KEY secret is not configured.
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Live API integration test
        env:
          PROMPTY_TEST_API_KEY: ${{ secrets.PROMPTY_TEST_API_KEY }}
          PROMPTY_TEST_BASE_URL: ${{ vars.PROMPTY_TEST_BASE_URL }}
        run: npm run test:integration

  publish:
    # Publish to npm only when:
    #   - the build job above is green, AND
    #   - the trigger is a push to `main` (not a PR), AND
    #   - the version in package.json is not already on npm.
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write # to push the version tag
      id-token: write # for npm provenance via GitHub OIDC
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use the default GITHUB_TOKEN - we only need it to push the tag
          # back to the branch, not to trigger downstream workflows.
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Resolve current version
        id: version
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "name=$PKG_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$PKG_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$PKG_VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if version is already published
        id: check
        run: |
          PKG_NAME="${{ steps.version.outputs.name }}"
          PKG_VERSION="${{ steps.version.outputs.version }}"
          if npm view "$PKG_NAME@$PKG_VERSION" version > /dev/null 2>&1; then
            echo "Version $PKG_VERSION is already published to npm - skipping."
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "Version $PKG_VERSION is not yet published - will publish."
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.check.outputs.should_publish == 'true'
        # `prepublishOnly` (defined in package.json) re-runs lint, typecheck,
        # tests with coverage, and build before publish - defense in depth.
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Tag the release
        if: steps.check.outputs.should_publish == 'true'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists locally - skipping create."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
          fi

      - name: Create GitHub Release
        if: steps.check.outputs.should_publish == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists - skipping."
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes
          fi
